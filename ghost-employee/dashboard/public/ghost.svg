<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="ghostGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8D8C4" />
      <stop offset="60%" stop-color="#6D2932" />
      <stop offset="100%" stop-color="#561C24" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background circular dash ring -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="url(#ghostGrad)" stroke-width="2.5" stroke-dasharray="6 4" opacity="0.6" />
  
  <!-- Sleek Modern Ghost Body -->
  <path d="M50,20 C32,20 28,35 28,52 C28,66 32,74 32,74 C32,74 37,69 41,74 C45,79 50,72 50,72 C50,72 55,79 59,74 C63,69 68,74 68,74 C68,74 72,66 72,52 C72,35 68,20 50,20 Z" fill="url(#ghostGrad)" filter="url(#glow)" />
  
  <!-- Cute Glowing Eyes -->
  <ellipse cx="43" cy="46" rx="3.5" ry="5.5" fill="#FFFFFF" />
  <ellipse cx="57" cy="46" rx="3.5" ry="5.5" fill="#FFFFFF" />
  <circle cx="44" cy="46" r="1.5" fill="#561C24" />
  <circle cx="58" cy="46" r="1.5" fill="#561C24" />
  
  <!-- Cute little mouth -->
  <path d="M47,56 Q50,59 53,56" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" fill="none" />
</svg>
